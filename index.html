<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой сайт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('OBR.png') no-repeat center center/cover;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background-color: rgba(0, 0, 0, 0.9);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <button onclick="openPDF('ZM1.pdf')">NÁVOD</button>
    <button onclick="openPDF('ZM2.pdf')">LAB INSTRUCTION</button>
  </div>

  <script>
    function openPDF(file) {
      window.open(file, '_blank');
    }
  </script>

</body>
</html>
